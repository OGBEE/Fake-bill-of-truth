<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Fake Bill of Truth</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a3a2a;
    --dark-green: #0d1f16;
    --light-green: #2d5a3d;
    --gold: #c9a84c;
    --cream: #f5f0e8;
    --paper: #ede8dc;
    --ink: #1a1a1a;
    --fade-green: rgba(26, 58, 42, 0.08);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--dark-green);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(201,168,76,0.03) 40px, rgba(201,168,76,0.03) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201,168,76,0.03) 40px, rgba(201,168,76,0.03) 41px);
    pointer-events: none;
    z-index: 0;
  }

  /* Vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }

  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ======= SCREEN 1 — LANDING ======= */
  .bill-wrapper {
    width: 100%;
    max-width: 380px;
    position: relative;
  }

  .bill {
    background: var(--paper);
    border-radius: 8px;
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
    box-shadow: 
      0 0 0 2px var(--gold),
      0 0 0 6px var(--green),
      0 0 0 8px var(--gold),
      0 20px 60px rgba(0,0,0,0.6);
  }

  /* Bill pattern background */
  .bill::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(26,58,42,0.04) 10px,
      rgba(26,58,42,0.04) 11px
    );
  }

  /* Corner ornaments */
  .bill::after {
    content: '✦ THE FAKE BILL OF TRUTH ✦';
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 7px;
    color: var(--green);
    letter-spacing: 2px;
    opacity: 0.5;
  }

  .bill-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .bill-serial {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--green);
    letter-spacing: 1px;
    opacity: 0.6;
  }

  .bill-denomination {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--green);
    line-height: 1;
  }

  .bill-title {
    text-align: center;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .bill-title-main {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--green);
    line-height: 1.1;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .bill-title-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--green);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.5;
    margin-top: 4px;
  }

  .bill-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 14px 0;
    opacity: 0.6;
  }

  .bill-seal {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
    position: relative;
    overflow: hidden;
    background: transparent;
  }

  .bill-tagline {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--green);
    text-align: center;
    line-height: 1.5;
    min-height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 8px;
    opacity: 0;
    animation: fadeInTag 1s ease 0.3s forwards;
  }

  @keyframes fadeInTag {
    to { opacity: 1; }
  }

  .bill-bottom {
    display: flex;
    justify-content: space-between;
    margin-top: 14px;
  }

  .bill-bottom-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    color: var(--green);
    opacity: 0.5;
    letter-spacing: 1px;
  }

  .btn {
    display: block;
    width: 100%;
    max-width: 380px;
    margin-top: 20px;
    padding: 16px 24px;
    background: var(--gold);
    color: var(--dark-green);
    border: none;
    border-radius: 4px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    cursor: pointer;
    position: relative;
    z-index: 10;
    transition: all 0.2s ease;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }

  .btn:active {
    transform: scale(0.97);
    box-shadow: 0 2px 10px rgba(201,168,76,0.2);
  }

  .btn-secondary {
    background: transparent;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.4);
    font-size: 14px;
    letter-spacing: 2px;
    margin-top: 12px;
    padding: 12px 24px;
    box-shadow: none;
  }

  /* ======= SCREEN 2 — TRUTH ======= */
  .truth-container {
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .truth-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0.7;
  }

  .truth-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.5;
    opacity: 0;
    transition: opacity 6s ease;
    margin-bottom: 40px;
    padding: 0 8px;
  }

  .truth-text.visible {
    opacity: 1;
  }

  .truth-question {
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }

  .truth-question.visible {
    opacity: 1;
    pointer-events: all;
  }

  .truth-question-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .btn-yn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 4px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-yn:active { transform: scale(0.95); }

  .btn-yes {
    background: #8b2020;
    color: var(--cream);
    box-shadow: 0 4px 16px rgba(139,32,32,0.3);
  }

  .btn-no {
    background: var(--light-green);
    color: var(--cream);
    box-shadow: 0 4px 16px rgba(45,90,61,0.3);
  }

  /* ======= SCREEN 3 — RESPONSE ======= */
  .response-container {
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .response-icon {
    font-size: 48px;
    margin-bottom: 20px;
    display: block;
  }

  .response-text {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.6;
    color: var(--cream);
    margin-bottom: 32px;
  }

  .response-text.yes-text {
    color: #ff6b6b;
  }

  .response-text.no-text {
    color: #7dd87d;
  }

  .divider-line {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 20px;
    opacity: 0.4;
  }

  /* Stamp effect */
  .stamp {
    display: inline-block;
    border: 3px solid currentColor;
    padding: 6px 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    transform: rotate(-8deg);
    margin-bottom: 20px;
    opacity: 0.85;
  }

  .stamp-triggered { color: #ff6b6b; border-color: #ff6b6b; }
  .stamp-legend { color: #7dd87d; border-color: #7dd87d; }

</style>
</head>
<body>

<!-- SCREEN 1: Landing -->
<div class="screen active" id="screen1">
  <div class="bill-wrapper">
    <div class="bill">
      <div class="bill-top">
        <div class="bill-serial">A 2024 7734 B</div>
        <div class="bill-denomination">$0</div>
      </div>

      <div class="bill-title">
        <div class="bill-title-main">The Fake Bill<br>of Truth</div>
        <div class="bill-title-sub">Not Legal Tender · Legally Honest</div>
      </div>

      <div class="bill-divider"></div>

      <div class="bill-seal">
        <img src="seal.png" alt="The Fake Bill of Truth Seal" style="width:100%; height:100%; object-fit:contain; border-radius:50%;">
      </div>

      <div class="bill-tagline" id="tagline"></div>

      <div class="bill-divider"></div>

      <div class="bill-bottom">
        <div class="bill-bottom-text">COUNTERFEIT</div>
        <div class="bill-bottom-text">GENUINE TRUTH</div>
      </div>
    </div>
  </div>
  <button class="btn" onclick="showTruth()">SHOW ME THE TRUTH</button>
</div>

<!-- SCREEN 2: Truth -->
<div class="screen" id="screen2">
  <div class="truth-container">
    <div class="truth-label">✦ The Truth ✦</div>
    <div class="truth-text" id="truthText"></div>
    <div class="truth-question" id="truthQuestion">
      <div class="truth-question-text">Was this offensive?</div>
      <div class="btn-row">
        <button class="btn-yn btn-yes" onclick="showResponse(true)">YES</button>
        <button class="btn-yn btn-no" onclick="showResponse(false)">NO</button>
      </div>
    </div>
  </div>
</div>

<!-- SCREEN 3: Response -->
<div class="screen" id="screen3">
  <div class="response-container">
    <span class="response-icon" id="responseIcon"></span>
    <div class="stamp" id="responseStamp"></div>
    <div class="divider-line"></div>
    <div class="response-text" id="responseText"></div>
  </div>
</div>

<script>
  const taglines = [
    "This bill is fake. But it only tells the truth.",
    "Counterfeit currency. Genuine truth.",
    "Worth $0. Priceless information.",
    "Not legal tender. Legally honest.",
    "Rejected by banks. Accepted by the universe.",
    "Zero dollars. Zero lies.",
    "The money is fake. The wisdom is real.",
    "Printed in deception. Filled with fact.",
    "No cash value. Unlimited truth value.",
    "The Fed said no. The cosmos said yes.",
    "Spend it nowhere. Know it everywhere.",
    "Counterfeit by design. Honest by nature.",
    "This will not pay your rent. It will pay your mind.",
    "Fake to the touch. True to the core.",
    "Invalid currency. Valid truth."
  ];

  const truths = [
    "You spent $14 on organic soap and still smell morally superior.",
    "Your coffee order now has more adjectives than actual coffee.",
    "You will soon attend a protest for a cause you learned about 11 minutes ago.",
    "A man with a barbecue and Oakleys will ruin your entire afternoon.",
    "Your future includes explaining why a cartoon from 1997 is problematic.",
    "You believe every problem can be solved with a bike lane and a podcast.",
    "You will soon lose an argument, then claim the other person was 'unsafe.'",
    "Your emotional support candle is running out of lavender.",
    "Somewhere, somehow, a gas stove is upsetting you.",
    "You are only three tweets away from demanding someone be cancelled.",
    "You will pay $18 for a burger and still blame capitalism.",
    "Your HOA fears your compost bin.",
    "You secretly enjoy country music but refuse to admit it publicly.",
    "Your therapist agrees you should stop arguing online at 2 AM.",
    "Your future contains reusable straws and unbearable opinions.",
    "A bald man in wraparound sunglasses will challenge your worldview.",
    "You will soon discover that touching grass was the answer all along.",
    "Your entire personality cannot continue being 'eat the rich' while ordering DoorDash.",
    "You will attend a town hall and somehow make potholes about colonialism.",
    "You own at least one sweater that looks hand-knitted by activism."
  ];

  const yesResponses = [
    "Good! Please file your complaint directly into the recycling bin.",
    "Good! Your oat milk support group meets Thursdays.",
    "Good! Take three deep breaths and blame late-stage capitalism.",
    "Good! Your safe space is currently under construction.",
    "Good! Please reduce your carbon footprint by stomping away quietly.",
    "Good! Someone nearby is already writing a petition about this.",
    "Good! A podcast host is preparing a 4-part series about your feelings.",
    "Good! Your emotional support tote bag will help you through this difficult time.",
    "Good! Your outrage has been certified organic and locally sourced.",
    "Good! A sociology major somewhere just felt a disturbance in the force.",
    "Good! A strongly worded Instagram story should solve this.",
    "Good! Your therapist can unpack this after your third iced oat latte.",
    "Good! You may now proceed to complain online for the next six hours.",
    "Good! Your carbon-neutral meltdown is now underway.",
    "Good! Please remain calm until your kombucha kicks in.",
    "Good! A bike lane will surely fix whatever this is.",
    "Good! Your feelings have been forwarded to the Ministry of Virtue.",
    "Good! Somewhere, a man with a barbecue just smiled.",
    "Good! Your reusable straw is shaking with anger.",
    "Good! You are now entitled to one dramatic Facebook post.",
    "Good! Another candle has been lit in honor of your discomfort.",
    "Good! Your protest playlist is already loading.",
    "Good! Your municipal zoning opinions remain exhausting.",
    "Good! The patchouli levels in the room just increased.",
    "Good! This reaction is exactly what the cookie hoped for."
  ];

  const noResponses = [
    "Good. Now drop this bill somewhere a liberal will find it. Tonight you sleep like a champion.",
    "You passed. Now put this bill back on the ground and let it do its work.",
    "A liberal is going to find this bill someday. That's the whole point. Sleep well.",
    "Not offended. You're one of the good ones. Drop this bill somewhere and walk away.",
    "Perfect. Leave this bill somewhere public. A liberal will find it. Justice will be served.",
    "Not offended. Drop this bill somewhere public and go to bed knowing a liberal will find it."
  ];

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function switchScreen(fromId, toId) {
    document.getElementById(fromId).classList.remove('active');
    setTimeout(() => {
      document.getElementById(toId).classList.add('active');
    }, 600);
  }

  // Set tagline on load
  document.getElementById('tagline').textContent = `"${pick(taglines)}"`;

  function showTruth() {
    const truth = pick(truths);
    document.getElementById('truthText').textContent = truth;
    document.getElementById('truthText').classList.remove('visible');
    document.getElementById('truthQuestion').classList.remove('visible');

    switchScreen('screen1', 'screen2');

    setTimeout(() => {
      document.getElementById('truthText').classList.add('visible');
    }, 700);

    // Question appears 3 seconds after truth starts fading in
    setTimeout(() => {
      document.getElementById('truthQuestion').classList.add('visible');
    }, 3700);
  }

  function showResponse(wasOffended) {
    const icon = wasOffended ? '😭' : '😎';
    const stamp = wasOffended ? 'TRIGGERED' : 'LEGEND';
    const stampClass = wasOffended ? 'stamp-triggered' : 'stamp-legend';
    const textClass = wasOffended ? 'yes-text' : 'no-text';
    const text = wasOffended ? pick(yesResponses) : pick(noResponses);

    document.getElementById('responseIcon').textContent = icon;

    const stampEl = document.getElementById('responseStamp');
    stampEl.textContent = stamp;
    stampEl.className = 'stamp ' + stampClass;

    const textEl = document.getElementById('responseText');
    textEl.textContent = text;
    textEl.className = 'response-text ' + textClass;

    switchScreen('screen2', 'screen3');
  }

  function restart() {
    document.getElementById('tagline').textContent = `"${pick(taglines)}"`;
    switchScreen('screen3', 'screen1');
  }
</script>
</body>
</html>
